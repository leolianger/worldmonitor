# Single image: root Dockerfile → Docker Hub ${{ secrets.DOCKERHUB_USERNAME }}/worldmonitor
# Self-hosted / Olares charts can reference this repo + tag.
#
# Multi-arch: linux/amd64 + linux/arm64 via Buildx/QEMU.
#
# Triggers: push to main, or manual workflow_dispatch.
#
# Secrets (Settings → Actions): DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — worldmonitor (Olares)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    name: Build and push worldmonitor
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      IMAGE_TAG: "2.5.23"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ format('{0}/worldmonitor', secrets.DOCKERHUB_USERNAME) }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=worldmonitor-docker
          cache-to: type=gha,mode=max,scope=worldmonitor-docker
